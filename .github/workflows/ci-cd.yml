name: CI/CD — Backend

on:
  push:
    branches:
      - main          # -> deploy to staging (continuous)
    tags:
      - 'v*'          # -> deploy to production
  # Run the checks (vet/test/migration safety) on every PR. Build runs on pushes
  # to main and v* tags; the per-job `if` below keep PRs from pushing images or
  # deploying, and keep main off production / tags off staging.
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/upguardly-server

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    # Ephemeral Postgres for the migration checks below.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: upguardly_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the destructive-DDL step can diff against the PR base.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc musl-dev postgresql-client

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      # Every committed migration must apply cleanly from an empty database.
      # (The former schema-vs-migrations drift gate went away with prisma: the
      # bun migrations are the sole source of truth — there is no declarative
      # schema to drift from.) The scheduler integration tests re-use this same
      # applied database.
      - name: Migration check (apply from empty)
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/upguardly_ci"
        run: go run ./cmd/migrate

      # Advisory only (never fails the build): surface destructive DDL in new
      # migrations so it gets a deliberate expand/contract review. See
      # docs/runbooks/migrations.md.
      - name: Flag destructive DDL
        if: github.event_name == 'pull_request'
        run: |
          set -uo pipefail
          base="origin/${{ github.base_ref }}"
          files=$(git diff --name-only "$base"...HEAD -- 'internal/database/bun/migrations' | grep '\.sql$' || true)
          if [ -z "$files" ]; then
            echo "No new migration SQL in this PR."
            exit 0
          fi
          matches=$(grep -inE 'DROP[[:space:]]+(TABLE|COLUMN)|ALTER[[:space:]]+COLUMN.*TYPE|DROP[[:space:]]+NOT[[:space:]]+NULL|TRUNCATE' $files || true)
          if [ -n "$matches" ]; then
            echo "$matches" | while IFS= read -r m; do
              echo "::warning::Destructive DDL: $m"
            done
            echo "Destructive change detected — roll it out with expand/contract (see docs/runbooks/migrations.md)."
          else
            echo "No destructive DDL detected in new migrations."
          fi

  build:
    name: Build & Push
    needs: ci
    # Build on pushes to main (-> staging) and on v* tags (-> production).
    # PRs are pull_request events and never reach here, so they never push.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    # GITHUB_TOKEN needs packages:write to push to GHCR; without it the push is
    # denied ("installation not allowed to Create organization package").
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full git tag (e.g. v1.2.0) — production pins this via GITHUB_REF_NAME.
            type=ref,event=tag
            # Bare semver (1.2.0) as a convenience alias on releases.
            type=semver,pattern={{version}}
            # Commit SHA on every build — staging pins this (main has no tag).
            type=sha,prefix=,format=long
            # `latest` only on releases, never on a main build.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    # Continuous staging: every push to main deploys the freshly built image —
    # pinned by full commit SHA (main has no version tag) — to the staging
    # server. Staging is decoupled from production (which ships on v* tags).
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          port: ${{ secrets.STAGING_SERVER_PORT }}
          script: |
            set -euo pipefail
            cd /opt/upguardly/staging
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER }} --password-stdin
            sed -i "s|^SERVER_IMAGE_TAG=.*|SERVER_IMAGE_TAG=${{ github.sha }}|" .env
            # docker-rollout: zero-downtime replace (start new replica, wait for
            # its healthcheck, then stop the old one). Installed on first deploy.
            if [ ! -x ~/.docker/cli-plugins/docker-rollout ]; then
              mkdir -p ~/.docker/cli-plugins
              curl -fsSL https://raw.githubusercontent.com/wowu/docker-rollout/v0.13/docker-rollout -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            fi
            # --ignore-buildable skips the locally-built db image (pgBackRest).
            docker compose pull --ignore-buildable
            # Apply migrations BEFORE rolling the code: the old replica keeps
            # serving against the new schema during the swap, which is safe as
            # long as migrations follow expand/contract (docs/runbooks/migrations.md).
            # A failed migration aborts the deploy with the old code still up.
            docker compose run --rm migrate
            # Roll the API without dropping requests; Caddy retries onto the new
            # replica (lb_try_duration in the Caddyfile).
            docker rollout server
            # Reconcile everything else (scheduler, db image rebuild, migrate
            # service record). Scheduler restarts stop-start — not user-facing.
            docker compose up -d --build --remove-orphans
            # Health-check in-container: server no longer publishes a host port
            # (Caddy fronts everything).
            timeout 60 bash -c 'until docker compose exec -T server wget -qO- http://127.0.0.1:8080/v1/health >/dev/null; do sleep 3; done'

  deploy-production:
    name: Deploy → Production
    # Production ships only on v* tags. `build` also runs for main pushes (for
    # staging), so this `if` is required to keep main off production.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SERVER_PORT }}
          script: |
            set -euo pipefail
            cd /opt/upguardly/production
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER }} --password-stdin
            sed -i "s|^SERVER_IMAGE_TAG=.*|SERVER_IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}|" .env
            # docker-rollout: zero-downtime replace (start new replica, wait for
            # its healthcheck, then stop the old one). Installed on first deploy.
            if [ ! -x ~/.docker/cli-plugins/docker-rollout ]; then
              mkdir -p ~/.docker/cli-plugins
              curl -fsSL https://raw.githubusercontent.com/wowu/docker-rollout/v0.13/docker-rollout -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            fi
            # --ignore-buildable skips the locally-built db image (pgBackRest).
            docker compose pull --ignore-buildable
            # Apply migrations BEFORE rolling the code: the old replica keeps
            # serving against the new schema during the swap, which is safe as
            # long as migrations follow expand/contract (docs/runbooks/migrations.md).
            # A failed migration aborts the deploy with the old code still up.
            docker compose run --rm migrate
            # Roll the API without dropping requests; Caddy retries onto the new
            # replica (lb_try_duration in the Caddyfile).
            docker rollout server
            # Reconcile everything else (scheduler, db image rebuild, migrate
            # service record). Scheduler restarts stop-start — not user-facing.
            docker compose up -d --build --remove-orphans
            # Health-check in-container: server no longer publishes a host port
            # (Caddy fronts everything).
            timeout 60 bash -c 'until docker compose exec -T server wget -qO- http://127.0.0.1:8080/v1/health >/dev/null; do sleep 3; done'
