name: CI/CD — Backend

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/upguardly-server

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc musl-dev

      - name: Generate Prisma client
        run: go run github.com/steebchen/prisma-client-go generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/placeholder"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          port: ${{ secrets.BACKEND_SERVER_PORT }}
          script: |
            set -euo pipefail
            cd /opt/upguardly/staging
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER }} --password-stdin
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}|" .env
            docker compose pull
            docker compose up -d --remove-orphans
            timeout 60 bash -c 'until curl -sf http://localhost:8081/v1/health; do sleep 3; done'

  deploy-production:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          key: ${{ secrets.BACKEND_SERVER_SSH_KEY }}
          port: ${{ secrets.BACKEND_SERVER_PORT }}
          script: |
            set -euo pipefail
            cd /opt/upguardly/production
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_PULL_USER }} --password-stdin
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}|" .env
            docker compose pull
            docker compose up -d --remove-orphans
            timeout 60 bash -c 'until curl -sf http://localhost:8080/v1/health; do sleep 3; done'
